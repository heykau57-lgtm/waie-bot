<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waie - My Senders</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #080310;
            --bg-gradient: radial-gradient(circle at 50% 0%, #1a0b2e 0%, #080310 80%);
            --card-bg: rgba(26, 11, 46, 0.85);
            --accent-pink: #db2777;
            --accent-purple: #9333ea;
            --accent-green: #10b981;
            --accent-red: #ff3333;
            --text-gray: #9ca3af;
            --font-title: 'Share Tech Mono', monospace;
            --font-code: 'Share Tech Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-dark);
            background-image: var(--bg-gradient);
            color: #ffffff;
            font-family: var(--font-code);
            min-height: 100vh;
        }
        header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px 25px;
            padding-top: 40px;
            background: rgba(8,3,16,0.95);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .back-btn {
            background: rgba(219,39,119,0.1);
            border: 1px solid rgba(219,39,119,0.3);
            color: var(--accent-pink);
            border-radius: 12px;
            padding: 10px 15px;
            font-size: 12px;
            text-decoration: none;
        }
        .logo {
            font-family: var(--font-title);
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            flex: 1;
        }
        main {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .glass-card {
            background: var(--card-bg);
            border: 1px solid rgba(236,72,153,0.3);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            font-size: 11px;
            color: var(--accent-pink);
            display: block;
            margin-bottom: 5px;
        }
        .input-group input, .dropdown-trigger {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
        }
        .btn-core {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            border: none;
            border-radius: 12px;
            color: white;
            font-family: var(--font-title);
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        .sender-item {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sender-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
            display: inline-block;
            margin-right: 10px;
        }
        .sender-status.connected { background: #10b981; }
        .btn-trash {
            background: rgba(255,51,51,0.1);
            border: 1px solid rgba(255,51,51,0.3);
            color: #ff4444;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26,11,46,0.95);
            border: 1px solid var(--accent-pink);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 12px;
            z-index: 2000;
            display: none;
        }
    </style>
</head>
<body>

<header>
    <a href="/dashboard" class="back-btn"><i class="fas fa-arrow-left"></i> BACK</a>
    <div class="logo">📱 MY SENDERS</div>
</header>

<main>
    <div class="glass-card">
        <div class="input-group">
            <label>COUNTRY CODE</label>
            <div class="dropdown-trigger" id="countryTrigger">🇲🇾 +60 Malaysia</div>
            <input type="hidden" id="countryCode" value="60">
        </div>
        <div class="input-group">
            <label>PHONE NUMBER</label>
            <input type="text" id="phoneNumber" placeholder="8123456789">
        </div>
        <button class="btn-core" id="addSenderBtn"><i class="fab fa-whatsapp"></i> GET PAIRING CODE</button>
    </div>

    <div class="glass-card">
        <h3 style="margin-bottom:15px">📡 ACTIVE SENDERS</h3>
        <div id="sendersList"></div>
    </div>
</main>

<div class="toast" id="toast"></div>

<script>
    async function loadSenders() {
        const res = await fetch('/api/my-senders');
        const data = await res.json();
        const container = document.getElementById('sendersList');
        if (!data.senders || data.senders.length === 0) {
            container.innerHTML = '<div style="text-align:center;color:#666">No senders yet</div>';
            return;
        }
        container.innerHTML = '';
        data.senders.forEach(sender => {
            container.innerHTML += `
                <div class="sender-item">
                    <div><span class="sender-status connected"></span> +${sender}</div>
                    <button class="btn-trash" onclick="deleteSender('${sender}')"><i class="fas fa-trash"></i></button>
                </div>
            `;
        });
    }
    
    async function deleteSender(number) {
        const res = await fetch('/api/delete-sender', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ number })
        });
        const data = await res.json();
        if (data.success) {
            showToast('Sender deleted');
            loadSenders();
        }
    }
    
    document.getElementById('addSenderBtn').addEventListener('click', async () => {
        const country = document.getElementById('countryCode').value;
        let number = document.getElementById('phoneNumber').value.trim();
        if (!number) { showToast('Enter number'); return; }
        number = number.replace(/\D/g, '');
        const fullNumber = country + number;
        
        const res = await fetch('/api/add-sender', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ number: fullNumber })
        });
        const data = await res.json();
        showToast(data.message);
        if (data.success) loadSenders();
    });
    
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }
    
    loadSenders();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waie - User Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #080310;
            --bg-gradient: radial-gradient(circle at 50% 0%, #1a0b2e 0%, #080310 80%);
            --card-bg: rgba(26, 11, 46, 0.85);
            --accent-pink: #db2777;
            --accent-purple: #9333ea;
            --accent-green: #10b981;
            --accent-red: #ff3333;
            --text-gray: #9ca3af;
            --font-title: 'Share Tech Mono', monospace;
            --font-code: 'Share Tech Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-dark);
            background-image: var(--bg-gradient);
            color: #ffffff;
            font-family: var(--font-code);
            min-height: 100vh;
        }
        header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px 25px;
            padding-top: 40px;
            background: rgba(8,3,16,0.95);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .back-btn {
            background: rgba(219,39,119,0.1);
            border: 1px solid rgba(219,39,119,0.3);
            color: var(--accent-pink);
            border-radius: 12px;
            padding: 10px 15px;
            font-size: 12px;
            text-decoration: none;
        }
        .logo {
            font-family: var(--font-title);
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 10px rgba(219,39,119,0.6);
            flex: 1;
        }
        main {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .page-title {
            font-family: var(--font-title);
            font-size: 20px;
            border-left: 4px solid var(--accent-pink);
            padding-left: 15px;
        }
        .btn-add {
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .glass-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(236,72,153,0.2);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        th {
            color: var(--accent-pink);
            font-size: 11px;
            text-transform: uppercase;
        }
        .badge-owner { color: #ff4444; }
        .badge-admin { color: #06b6d4; }
        .badge-user { color: #10b981; }
        .btn-icon {
            background: none;
            border: none;
            color: var(--text-gray);
            cursor: pointer;
            margin: 0 5px;
        }
        .btn-edit:hover { color: #06b6d4; }
        .btn-delete:hover { color: #ff4444; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: linear-gradient(135deg, #1a0b2e, #0f0518);
            border: 1px solid rgba(219,39,119,0.4);
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 450px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-size: 11px;
            color: var(--accent-pink);
            margin-bottom: 5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
        }
        .modal-footer {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-save {
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }
        .btn-cancel {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26,11,46,0.95);
            border: 1px solid var(--accent-pink);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 12px;
            z-index: 2000;
            display: none;
        }
    </style>
</head>
<body>

<header>
    <a href="/dashboard" class="back-btn"><i class="fas fa-arrow-left"></i> BACK</a>
    <div class="logo">👥 USER MANAGEMENT</div>
</header>

<main>
    <div class="page-header">
        <h2 class="page-title">DATABASE USERS</h2>
        <button class="btn-add" id="addUserBtn"><i class="fas fa-plus"></i> NEW USER</button>
    </div>

    <div class="glass-card">
        <div class="table-responsive">
            <table id="usersTable">
                <thead>
                    <tr><th>Username</th><th>Role</th><th>Key</th><th>Expired</th><th>Status</th><th>Action</th></tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr><td colspan="6" style="text-align:center">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div class="modal" id="userModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Add User</h3>
            <button class="close-modal" onclick="closeModal()">&times;</button>
        </div>
        <form id="userForm">
            <div class="form-group">
                <label>USERNAME</label>
                <input type="text" id="usernameInput" required>
            </div>
            <div class="form-group">
                <label>ROLE</label>
                <select id="roleSelect">
                    <option value="user">USER</option>
                    <option value="admin">ADMIN</option>
                </select>
            </div>
            <div class="form-group">
                <label>KEY (biarkan kosong untuk auto)</label>
                <input type="text" id="keyInput">
            </div>
            <div class="form-group">
                <label>DURATION</label>
                <select id="durationSelect">
                    <option value="7d">7 Days</option>
                    <option value="30d" selected>30 Days</option>
                    <option value="90d">90 Days</option>
                    <option value="365d">1 Year</option>
                    <option value="permanent">Permanent</option>
                </select>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="closeModal()">CANCEL</button>
                <button type="submit" class="btn-save">SAVE</button>
            </div>
        </form>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    let editingUser = null;
    
    async function loadUsers() {
        const res = await fetch('/api/users');
        const data = await res.json();
        const tbody = document.getElementById('usersTableBody');
        if (!data.success || !data.users.length) {
            tbody.innerHTML = '<tr><td colspan="6">No users</td></tr>';
            return;
        }
        tbody.innerHTML = '';
        data.users.forEach(user => {
            const row = tbody.insertRow();
            row.innerHTML = `
                <td>${user.username}</td>
                <td><span class="badge-${user.role}">${user.role}</span></td>
                <td><code>${user.key}</code></td>
                <td>${new Date(user.expired).toLocaleDateString()}</td>
                <td>${user.status === 'Active' ? '✅ Active' : '❌ Expired'}</td>
                <td>
                    <button class="btn-icon btn-edit" onclick="editUser('${user.username}')"><i class="fas fa-edit"></i></button>
                    <button class="btn-icon btn-delete" onclick="deleteUser('${user.username}')"><i class="fas fa-trash"></i></button>
                </td>
            `;
        });
    }
    
    async function editUser(username) {
        const res = await fetch(`/api/user/${username}`);
        const data = await res.json();
        if (!data.success) return;
        editingUser = data.user;
        document.getElementById('modalTitle').innerText = 'Edit User';
        document.getElementById('usernameInput').value = data.user.username;
        document.getElementById('usernameInput').readOnly = true;
        document.getElementById('roleSelect').value = data.user.role;
        document.getElementById('keyInput').value = '';
        document.getElementById('userModal').style.display = 'flex';
    }
    
    async function deleteUser(username) {
        if (!confirm(`Delete ${username}?`)) return;
        const res = await fetch(`/api/user/${username}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) {
            showToast('User deleted', 'success');
            loadUsers();
        }
    }
    
    document.getElementById('userForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('usernameInput').value;
        const role = document.getElementById('roleSelect').value;
        const key = document.getElementById('keyInput').value;
        const duration = document.getElementById('durationSelect').value;
        
        const url = editingUser ? `/api/user/${editingUser.username}` : '/api/user';
        const method = editingUser ? 'PUT' : 'POST';
        
        const res = await fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, role, key, duration })
        });
        const data = await res.json();
        if (data.success) {
            showToast(data.message, 'success');
            closeModal();
            loadUsers();
        } else {
            showToast(data.error, 'error');
        }
    });
    
    function openAddModal() {
        editingUser = null;
        document.getElementById('modalTitle').innerText = 'Add User';
        document.getElementById('usernameInput').value = '';
        document.getElementById('usernameInput').readOnly = false;
        document.getElementById('roleSelect').value = 'user';
        document.getElementById('keyInput').value = '';
        document.getElementById('userModal').style.display = 'flex';
    }
    
    function closeModal() {
        document.getElementById('userModal').style.display = 'none';
    }
    
    function showToast(msg, type) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }
    
    document.getElementById('addUserBtn').addEventListener('click', openAddModal);
    loadUsers();
</script>
</body>
</html>
